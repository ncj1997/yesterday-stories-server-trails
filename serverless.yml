service: yesterday-stories-serverless

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: ${env:AWS_REGION, 'us-east-1'}
  architecture: arm64
  memorySize: 512
  timeout: 30
  
  environment:
    # Database Configuration
    DB_HOST: ${env:DB_HOST, 'localhost'}
    DB_USER: ${env:DB_USER, 'root'}
    DB_PASSWORD: ${env:DB_PASSWORD, 'password'}
    DB_NAME: ${env:DB_NAME, 'yesterday_stories'}
    
    # AWS Configuration
    S3_BUCKET: ${self:custom.s3BucketName}
    MY_AWS_KEY: ${self:custom.awsAccessKey}
    MY_AWS_SECRET: ${self:custom.awsSecretKey}
    
    # Environment Stage
    STAGE: ${sls:stage}
  
  # IAM Permissions for Lambda
  iam:
    role:
      statements:
        # S3 Permissions
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:DeleteObject
            - s3:GetObject
          Resource: 'arn:aws:s3:::${self:custom.s3BucketName}/*'
        
        # CloudWatch Logs
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: 'arn:aws:logs:*:*:*'

functions:
  # Main API Handler
  api:
    handler: src/index.handler
    events:
      # Trails
      - http:
          path: trails
          method: post
          cors: true
      - http:
          path: trails/{proxy+}
          method: get
          cors: true
      - http:
          path: trails/{proxy+}
          method: put
          cors: true
      - http:
          path: trails/{proxy+}
          method: delete
          cors: true
      
      # File Uploads - Batch presigned URLs only
      - http:
          path: files/batch-presigned-urls
          method: post
          cors: true
      
      # Health Check
      - http:
          path: health
          method: get
          cors: true
      
      # Payments
      - http:
          path: payments/create-intent
          method: post
          cors: true

# Plugins
plugins:
  - serverless-offline
  - serverless-dotenv-plugin

# Custom settings
custom:
  s3BucketName: yesterday-stories-uploads-${sls:stage}
  # Store credentials - will be loaded from .env by dotenv plugin
  awsAccessKey: ${env:AWS_ACCESS_KEY_ID, ''}
  awsSecretKey: ${env:AWS_SECRET_ACCESS_KEY, ''}
  
  dotenv:
    exclude:
      - AWS_REGION
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_ACCOUNT_ID
    # Credentials are read by serverless for custom section, then passed as MY_AWS_KEY/MY_AWS_SECRET

  serverless-offline:
    httpPort: 3001
    websocketPort: 3002
    host: 0.0.0.0

# S3 Bucket for file uploads
resources:
  Resources:
    S3BucketForUploads:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.s3BucketName}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - '*'
              AllowedMethods:
                - GET
                - PUT
                - POST
                - DELETE
              AllowedOrigins:
                - '*'
              MaxAge: 3000
        Tags:
          - Key: Environment
            Value: ${sls:stage}
          - Key: Application
            Value: yesterday-stories

    S3BucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref S3BucketForUploads
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            # Allow public read access
            - Effect: Allow
              Principal: '*'
              Action: 's3:GetObject'
              Resource: !Sub '${S3BucketForUploads.Arn}/*'
            
            # Allow uploads via presigned URLs
            - Effect: Allow
              Principal: '*'
              Action:
                - 's3:PutObject'
                - 's3:DeleteObject'
              Resource: !Sub '${S3BucketForUploads.Arn}/*'

  Outputs:
    ApiEndpoint:
      Description: API Gateway endpoint URL
      Value:
        Fn::Join:
          - ''
          - - 'https://'
            - !Ref ApiGatewayRestApi
            - '.execute-api.'
            - !Ref 'AWS::Region'
            - '.amazonaws.com/'
            - '${sls:stage}'
    S3BucketName:
      Description: S3 Bucket for file uploads
      Value: !Ref S3BucketForUploads
    S3BucketArn:
      Description: S3 Bucket ARN
      Value: !GetAtt S3BucketForUploads.Arn
